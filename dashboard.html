<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Schmeckles Dashboard (λ)</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: #1c1c1c;
      border-bottom: 1px solid #333;
    }

    .metric {
      flex: 1;
      text-align: center;
      font-size: 13px;
    }

    .metric span {
      display: block;
      font-size: 18px;
      margin-top: 4px;
      font-weight: bold;
    }

    .earned span { color: #4caf50; }
    .debt span { color: #ff4d4d; }
    .total span { color: #4da3ff; }

    /* MAIN */
    .container {
      padding: 20px;
      max-width: 700px;
      margin: auto;
    }

    #welcome {
      margin-bottom: 15px;
      color: #ccc;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">

    <div class="metric earned">
      Earned
      <span id="earned">0 λ</span>
    </div>

    <div class="metric debt">
      Debt
      <span id="debt">0 λ</span>
    </div>

    <div class="metric total">
      Total
      <span id="total">0 λ</span>
    </div>

  </div>

  <!-- MAIN -->
  <div class="container">
    <div id="welcome"></div>
  </div>

  <script src="database.js"></script>

  <script>
    // 🔐 LOAD SESSION USER
    const sessionUser = JSON.parse(localStorage.getItem("schmeck_user"));

    if (!sessionUser) {
      window.location.href = "index.html";
    }

    // 📦 LOAD FULL DATABASE (PERSISTENT STATE)
    let users = JSON.parse(localStorage.getItem("schmeckles_data"));

    // 🔍 FIND REAL UPDATED USER
    let user = users.find(u => u.id === sessionUser.id);

    if (!user) {
      window.location.href = "index.html";
    }

    // 👋 WELCOME TEXT
    document.getElementById("welcome").innerText =
      "Welcome, " + user.name + " | ID: " + user.id;

    // 🪙 REAL λ SYSTEM (PERSISTENT)
    const earned = user.lambda;
    const debt = 0;
    const total = earned - debt;

    document.getElementById("earned").innerText = earned + " λ";
    document.getElementById("debt").innerText = debt + " λ";
    document.getElementById("total").innerText = total + " λ";

  </script>

</body>
</html>
