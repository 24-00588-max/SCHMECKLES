<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Schmeckles Login (λ)</title>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1c1c1c;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 5px;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      background: #4caf50;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    #result {
      margin-top: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Schmeckles System (λ)</h2>

    <input id="name" placeholder="Student Name">
    <input id="pin" type="password" placeholder="PIN">

    <button onclick="login()">Login</button>

    <div id="result"></div>
  </div>

  <script src="database.js"></script>

  <script>
    function login() {
  const name = document.getElementById("name").value;
  const pin = document.getElementById("pin").value;
  const result = document.getElementById("result");

  const user = findUser(name, pin);

  if (user) {
    localStorage.setItem("schmeck_user", JSON.stringify(user));

    result.style.color = "lightgreen";
    result.innerText = "Access granted...";

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 500);

  } else {
    result.style.color = "red";
    result.innerText = "Access denied.";
  }
}
  </script>

</body>
</html>
